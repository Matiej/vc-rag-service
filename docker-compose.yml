services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vc_pgvector
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - vc_pgvector_data:/var/lib/postgresql/data

volumes:
  vc_pgvector_data: